server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Cache hashed assets aggressively — Vite fingerprints filenames, so this is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any unknown path returns index.html so React Router handles it
    # instead of nginx returning 404 on a page refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
