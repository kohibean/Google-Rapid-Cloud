# .github/workflows/build-and-push.yml
#
# METHOD 1 — GitHub Actions: build a container image and push it to a registry.
# Target registry: GitHub Container Registry (ghcr.io). It's chosen for teaching because
# auth uses the built-in GITHUB_TOKEN — no external cloud credentials needed, so students
# see the "build → push" concept in isolation. (Production note in the teaching guide.)

name: Build & Push Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/<repo>/siningai-agent
  IMAGE_NAME: ${{ github.repository }}/siningai-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Least-privilege: this job only needs to read the repo and write packages (images).
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Buildx unlocks layer caching and multi-platform builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # On pull requests we BUILD (to catch breakage) but do NOT log in or push.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup required

      # Generates a sensible set of tags/labels from git context.
      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # context is repo root: requirements.txt lives there, agent code in siningai_agent/.
          context: .
          file: ./siningai_agent/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted layer cache keeps repeat builds fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
